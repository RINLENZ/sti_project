<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Gradient moderne -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD166"/>
      <stop offset="100%" stop-color="#A66A00"/>
    </linearGradient>

    <!-- Dégradé pour l’onde -->
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF3B0"/>
      <stop offset="100%" stop-color="#D4A853"/>
    </linearGradient>
  </defs>

  <!-- Fond -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>

  <!-- Lettre S (centrée et modernisée) -->
  <text
    x="20"
    y="44"
    font-family="Segoe UI, Inter, Arial, sans-serif"
    font-size="34"
    font-weight="800"
    fill="white"
    letter-spacing="-1"
  >
    S
  </text>

  <!-- Onde fluide unique (style intelligent / adaptatif) -->
  <path 
    d="M40 18 
       C50 26, 50 38, 40 46 
       C46 38, 46 26, 40 18"
    fill="none"
    stroke="url(#wave)"
    stroke-width="3"
    stroke-linecap="round"
  />
</svg>